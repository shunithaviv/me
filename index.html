<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shunit Haviv Hakimi</title>
  <meta name="description" content="Shunit Haviv Hakimi, Applied Scientist excited about AI for audio and video, building new things." />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Shunit Haviv Hakimi" />
  <meta property="og:description" content="Applied Scientist excited about AI for audio and video, building new things." />
  <meta property="og:url" content="https://shunit.ai" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: oklch(98.5% 0.004 300);
      --surface: oklch(99.4% 0.003 300);
      --ink: oklch(26% 0.02 290);
      --muted: oklch(48% 0.02 290);
      --line: oklch(90% 0.012 300);
      --accent: oklch(52% 0.16 295);
      --accent-soft: oklch(52% 0.16 295 / 0.14);
      --focus: oklch(52% 0.16 295 / 0.55);
    }

    * { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      font-size: 17px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      max-width: 60rem;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100svh;
      padding: clamp(2rem, 8vh, 6rem) clamp(1.5rem, 6vw, 4rem);
      display: flex;
      flex-direction: column;
    }

    main { flex: 1 0 auto; max-width: 48rem; }

    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: clamp(2.5rem, 7vw, 4.25rem);
      line-height: 1.02;
      letter-spacing: -0.02em;
      margin: 0 0 1.4rem;
      color: oklch(30% 0.075 295);
    }

    .intro {
      font-size: clamp(1.02rem, 1.5vw, 1.15rem);
      color: var(--muted);
      margin: 0 0 2.4rem;
      text-wrap: pretty;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.9rem;
    }

    .links a {
      position: relative;
      color: var(--ink);
      text-decoration: none;
      padding-bottom: 2px;
    }
    .links a::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 1.5px;
      background: var(--accent);
      opacity: 0.4;
      transition: opacity 0.28s ease-out;
    }
    .links a:hover { color: var(--accent); }
    .links a:hover::after { opacity: 1; }

    .meanwhile {
      margin-top: clamp(3.5rem, 10vh, 6rem);
      padding-top: 2rem;
      border-top: 1px solid var(--line);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: clamp(1.25rem, 4vw, 2.5rem);
    }

    .meanwhile p {
      margin: 0;
      max-width: 26ch;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .meanwhile a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
      background: linear-gradient(var(--accent), var(--accent)) left bottom / 100% 1.5px no-repeat;
      padding-bottom: 1px;
      transition: background-size 0.28s ease-out;
    }
    .meanwhile a:hover {
      background: linear-gradient(var(--accent-soft), var(--accent-soft)) left bottom / 100% 100% no-repeat;
    }

    .meanwhile video {
      width: clamp(9rem, 30vw, 15rem);
      height: clamp(9rem, 30vw, 15rem);
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid color-mix(in oklch, var(--accent) 22%, var(--line));
      background: var(--surface);
      display: block;
      flex: none;
    }

    footer {
      margin-top: clamp(3rem, 8vh, 5rem);
      padding-top: 1.5rem;
      color: var(--muted);
      font-size: 0.82rem;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      letter-spacing: 0.01em;
    }

    a:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 4px;
      border-radius: 3px;
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="page">
    <main>
      <h1>Shunit Haviv Hakimi</h1>
      <p class="intro">Applied Scientist, excited about AI for audio and video, building new things.</p>

      <nav class="links" aria-label="Profiles">
        <a href="https://github.com/shunithaviv">GitHub</a>
        <a href="https://www.linkedin.com/in/shunit-haviv/">LinkedIn</a>
      </nav>

      <section class="meanwhile" aria-label="Meanwhile">
        <p>Still building the real site. Here's something I made in the meantime: <a href="https://latent-spaces.github.io/brag/">brag</a>.</p>
        <video src="assets/brag.mp4" autoplay muted loop playsinline aria-label="Looping clip of brag"></video>
      </section>
    </main>

    <footer>
      &copy; <span id="year"></span> Shunit Haviv Hakimi
    </footer>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
